name: Build and Release AETHER
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build AETHER for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: aether-windows-x64.exe
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: aether-linux-x64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: aether-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: aether-macos-arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build production binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy & Rename Artifacts
        shell: bash
        run: |
          mkdir -p dist/
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/aether.exe dist/${{ matrix.artifact_name }}
          else
            cp target/${{ matrix.target }}/release/aether dist/${{ matrix.artifact_name }}
          fi
          cd dist/
          shasum -a 256 ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: aether-binaries-${{ matrix.target }}
          path: dist/*
