<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 320">
  <defs>
    <linearGradient id="fileGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1128;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B2CBF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00F5FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- File Shape -->
  <path d="M 20 20 L 180 20 L 236 76 L 236 300 L 20 300 Z" 
        fill="url(#fileGradient)" stroke="url(#iconGradient)" stroke-width="4"/>
  
  <!-- Folded Corner -->
  <path d="M 180 20 L 180 76 L 236 76 Z" 
        fill="#1a1f3a" stroke="url(#iconGradient)" stroke-width="4"/>
  
  <!-- Mini "A" Logo -->
  <g transform="translate(128, 160) scale(0.4)">
    <path d="M 0 -100 L -60 100 L -30 100 L -15 40 L 15 40 L 30 100 L 60 100 Z" 
          fill="none" stroke="url(#iconGradient)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M -25 0 L 25 0" 
          fill="none" stroke="url(#iconGradient)" stroke-width="12" stroke-linecap="round"/>
  </g>
  
  <!-- Extension Text -->
  <text x="128" y="260" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        fill="url(#iconGradient)" text-anchor="middle">.aether</text>
</svg>
