<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1128;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="quantumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B2CBF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9D4EDD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00F5FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" stroke="url(#quantumGradient)" stroke-width="8"/>
  
  <!-- Quantum Wave Pattern -->
  <g filter="url(#glow)">
    <!-- Main "A" Shape -->
    <path d="M 256 100 L 180 350 L 220 350 L 240 280 L 272 280 L 292 350 L 332 350 Z" 
          fill="none" stroke="url(#quantumGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Crossbar -->
    <path d="M 225 240 L 287 240" 
          fill="none" stroke="url(#quantumGradient)" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Quantum Orbits -->
    <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#00F5FF" stroke-width="2" opacity="0.6" transform="rotate(-30 256 256)"/>
    <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#7B2CBF" stroke-width="2" opacity="0.6" transform="rotate(30 256 256)"/>
    <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#9D4EDD" stroke-width="2" opacity="0.6"/>
    
    <!-- Quantum Dots -->
    <circle cx="256" cy="100" r="8" fill="#00F5FF" filter="url(#glow)"/>
    <circle cx="180" cy="350" r="8" fill="#7B2CBF" filter="url(#glow)"/>
    <circle cx="332" cy="350" r="8" fill="#9D4EDD" filter="url(#glow)"/>
  </g>
  
  <!-- Text "AETHER" -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="url(#quantumGradient)" text-anchor="middle" letter-spacing="8">AETHER</text>
</svg>
